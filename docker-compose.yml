version: '3.8'

services:
  # === КРАСНОДАР ===
  ps_krasnodar:
    build: .
    restart: always
    env_file: .env
    volumes:
      - ./data:/app/data
    command: python ps.py "INBOX.kpp_krasnodar.INBOX" "data/krasnodar.db"

  mon_krasnodar:
    build: .
    restart: always
    env_file: .env
    volumes:
      - ./data:/app/data
    command: python monitor.py "data/krasnodar.db" "data/allowed_krasnodar.txt" "111001" "Краснодар"

  # === МИНВОДЫ ===
  ps_minvody:
    build: .
    restart: always
    env_file: .env
